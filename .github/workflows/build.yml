name: Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSVC Compiler
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: amd64
    
    - name: Build Client
      run: |
        cl /EHsc /O2 client.cpp /link /SUBSYSTEM:WINDOWS user32.lib gdi32.lib gdiplus.lib winmm.lib ws2_32.lib
    
    - name: Build Server
      run: |
        cl /EHsc /O2 server.cpp /link ws2_32.lib user32.lib
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Nyx-Builds
        path: |
          *.exe